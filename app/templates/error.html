{% extends "base.html" %}

{% block content %}

    <div class="container"><h1>{{ code }}</h1></div>
  </section>
  <main class="admin-wrap">
    <div class="container" style="text-align:center">
      <p style="font-size:19px;color:var(--green-900);font-weight:700;margin-bottom:26px">{{ message }}</p>
      <a href="{{ url_for('home') }}" class="btn-publish" style="text-decoration:none">العودة إلى الصفحة الرئيسية</a>
    </div>
  </main>
{% endblock %}
